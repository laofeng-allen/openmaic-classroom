version: '3.8'

services:
  # Nginx 静态站点 + 反向代理
  nginx:
    image: nginx:alpine
    container_name: classroom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html/classroom:ro
    networks:
      - classroom
    depends_on:
      - api

  # Classroom API 后端
  api:
    image: node:20-alpine
    container_name: classroom-api
    restart: unless-stopped
    working_dir: /app
    command: sh -c "node server.js"
    environment:
      - PORT=5000
      - UPLOAD_FOLDER=/data/courses
      - DATA_FILE=/data/courses.json
      - TEMP_DIR=/tmp/classroom-upload
    volumes:
      - ./backend:/app:ro
      - classroom-data:/data
    networks:
      - classroom

networks:
  classroom:
    driver: bridge

volumes:
  classroom-data:
